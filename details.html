<!DOCTYPE html>
<html>
<head>
    <title>User Information</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.css" />

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.js"></script>

    <style>
        body {
            background: inherit;
            color: #fff;
            padding: 20px;
            font-family: inherit;
        }
        .btn{
            color: #fff;
            background-color: #ac3b61;
        }
        .container-fluid {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal .modal-dialog {
            margin-top: 20vh;
        }

        #enterInfoContainer {
            max-width: 500px;
        }

        #detailsContainer {
            min-width: 600px;
        }

        .table-container {
            overflow-x: auto;
        }

        .table-custom {
            width: 100%;
            font-size: 14px;
        }

        .table-custom th,
        .table-custom td {
            padding: 10px;
        }

        .datepicker {
            z-index: 9999 !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid">

        <h2>Enter Your Information</h2>
        <form id="detailsForm" method="POST" action="add_details.php">

            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label>ID:</label>
                        <input type="text" name="id" id="id" class="form-control" placeholder="ID" >
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" name="name" id="name" class="form-control" pattern="[A-Za-z ]+" placeholder="Name" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Date of birth:</label>
                        <input type="text" name="dob" id="dob" class="form-control datepicker" placeholder="Date of Birth" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" id="phone" class="form-control" placeholder="Phone Number" pattern="[0-9]{10}" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Institution</label>
                        <input type="text" name="institution" id="institution" class="form-control" placeholder="Institution" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Status</label>
                        <select name="status" id="status" class="form-control">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" id="role" class="form-control">
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                </div>
                

                <div class="col-md-4">
                    <div class="form-group">
                        <button type="submit" class="btn" style="width: auto; margin-top: 25px;">Submit</button>
                        <button type="button" class="btn" id="clearBtn" style="width: auto; margin-top: 25px; margin-left: 10px;">Clear</button>
                    </div>
                </div>

                


                <div class="col-md-12" id="detailsContainer">
                    <div class="display-container">
                        <h3>Details</h3>
                        <div class="table-container">
                            <table id="DetailsTable" class="table table-striped table-custom">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Date of Birth</th>
                                        <th>Phone Number</th>
                                        <th>Email</th>
                                        <th>Institution</th>
                                        <th>Status</th>
                                        <th>Role</th>
                                    </tr>
                                </thead>
                                
                                <tbody id="attendanceTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <script>
        $(document).ready(function() {
            function fetchData() {
                $.ajax({
                    url: "get_details.php",
                    type: "GET",
                    success: function(data) {
                        $("#attendanceTableBody").html(data);
    
                        setTimeout(function() {
                            $('#DetailsTable').DataTable(); 
                        }, 50);
                    }
                });
            }
    
            fetchData();
            setInterval(fetchData, 1000);
    
            $('.datepicker').datepicker({
                format: 'dd-mm-yyyy',
                autoclose: true,
                orientation: 'bottom'
            });
    
            $("#detailsForm").submit(function(event) {
                event.preventDefault();
    
                var formData = $(this).serialize();
    
                $.ajax({
                    url: $(this).attr("action"),
                    type: $(this).attr("method"),
                    data: formData,
                    success: function(response) {
                        fetchData();
                        $("#detailsForm")[0].reset();
    
                        alert("Data entered successfully!");
                    }
                });
            });
    
            $("#clearBtn").click(function() {
                $("#detailsForm")[0].reset();
            });
    
            $("#id").on("change", function() {
                var id = $(this).val();
    
                if (!isNaN(id) && id !== "") {
                    $.ajax({
                        url: "get_details_by_id.php",
                        type: "GET",
                        data: { id: id },
                        success: function(response) {
                            if (response !== "") {
                                var details = JSON.parse(response);
                                $("#name").val(details.name);
                                $("#dob").val(details.dob);
                                $("#phone").val(details.phone);
                                $("#email").val(details.email);
                                $("#institution").val(details.institution);
                                $("#role").val(details.role); 
                            } else {
                                $("#detailsForm")[0].reset();
                                alert("No details found for the provided ID.");
                            }
                        }
                    });
                }
            });
    
        });
    </script>
    
    
    </script>
</body>
</html>
